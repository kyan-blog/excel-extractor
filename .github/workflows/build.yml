name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install UPX
        run: choco install upx -y

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name ExcelExtractor `
            --exclude-module matplotlib `
            --exclude-module numpy.testing `
            --exclude-module pandas.tests `
            --exclude-module PIL `
            --exclude-module tkinter.test `
            --exclude-module unittest `
            --exclude-module email `
            --exclude-module html `
            --exclude-module http `
            --exclude-module urllib `
            --exclude-module xml `
            --exclude-module asyncio `
            --exclude-module concurrent `
            --exclude-module ctypes `
            --exclude-module curses `
            --exclude-module distutils `
            --exclude-module doctest `
            --exclude-module ftplib `
            --exclude-module getpass `
            --exclude-module glob `
            --exclude-module gzip `
            --exclude-module hashlib `
            --exclude-module imaplib `
            --exclude-module ipaddress `
            --exclude-module logging `
            --exclude-module lzma `
            --exclude-module multiprocessing `
            --exclude-module pickle `
            --exclude-module pprint `
            --exclude-module profile `
            --exclude-module pydoc `
            --exclude-module smtplib `
            --exclude-module socket `
            --exclude-module sqlite3 `
            --exclude-module ssl `
            --exclude-module tarfile `
            --exclude-module telnetlib `
            --exclude-module termios `
            --exclude-module textwrap `
            --exclude-module tokenize `
            --exclude-module traceback `
            --exclude-module zipfile `
            --upx-dir "C:\ProgramData\chocolatey\bin" `
            main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExcelExtractor-windows
          path: dist/ExcelExtractor.exe
          retention-days: 30
